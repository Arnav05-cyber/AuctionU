server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # 1. Route for AUTH SERVICE
        - id: auth-service
          uri: lb://AUTH-SERVICE # Use 'lb://' for Load Balancing via Eureka
          predicates:
            - Path=/auth/v1/**

        # 2. Route for PRODUCT WEBSOCKETS
        - id: product-websocket-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/ws-auction/**

        # 3. Route for PRODUCT API (Standard REST)
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v1/products/**

        # 4. Route for USER SERVICE
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/users/**
          filters:
            - AuthenticationFilter
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10

  data:
    redis:
      host: localhost
      port: 6379