# ===============================
# Application
# ===============================
spring.application.name=user-service
server.port=9810

# ===============================
# Kafka Configuration (CONSUMER)
# ===============================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=userinfo-consumer-group-v3
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.arnav.userService.dtos.UserDto
spring.kafka.consumer.properties.spring.json.trusted.packages=*


# Topic name (USED by @KafkaListener)
spring.kafka.topic.name=userEvents

# ===============================
# MySQL Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/userservice
spring.datasource.username=root
spring.datasource.password=password

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# ===============================
# Logging (use DEBUG only while troubleshooting)
# ===============================
logging.level.org.apache.kafka=INFO
logging.level.org.springframework.kafka=INFO
