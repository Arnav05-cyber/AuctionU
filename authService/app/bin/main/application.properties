spring.application.name=auth-service

# ===============================
# MySQL Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/authservice
spring.datasource.username=authuser
spring.datasource.password=authpassword

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Server
# ===============================
server.port=9820

# ===============================
# Kafka Producer Configuration
# ===============================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer



# Topic name (inject in producer code)
spring.kafka.topic.name=userEvents

# ===============================
# Logging
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.apache.kafka=INFO
logging.level.org.springframework.kafka=INFO
